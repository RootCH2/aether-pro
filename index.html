<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHER PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#ff1aec;
  overflow:hidden;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(255,0,0,0.15), transparent);
  animation:pulse 4s infinite;
}
@keyframes pulse{
  0%,100%{opacity:0.3}
  50%{opacity:0.6}
}

/* SCROLL BAR */
.scroll-bar{
  position:fixed;
  bottom:0;
  width:100%;
  height:30px;
  background:#111;
  overflow:hidden;
  border-top:1px solid rgb(255, 0, 200);
}
.scroll-text{
  white-space:nowrap;
  position:absolute;
  animation:scroll 15s linear infinite;
  color:#ff1ae0;
  font-weight:bold;
}
@keyframes scroll{
  from{left:100%}
  to{left:-100%}
}

/* CARD */
.card{
  position:relative;
  z-index:2;
  max-width:900px;
  margin:80px auto;
  padding:40px;
  border-radius:20px;
  background:rgba(0,0,0,0.85);
  border:2px solid rgb(218, 17, 236);
  box-shadow:0 0 40px rgb(255, 0, 191);
  text-align:center;
  backdrop-filter:blur(10px);
}

h1{
  font-size:45px;
  text-shadow:0 0 20px rgb(212, 9, 219);
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:1px solid rgb(217, 17, 224);
  background:black;
  color:#f803af;
  font-size:18px;
  margin-bottom:15px;
  transition:0.3s;
}
input:focus{
  box-shadow:0 0 20px rgb(236, 6, 206);
  transform:scale(1.02);
}

/* BUTTON */
button{
  padding:10px 20px;
  border:none;
  background:rgb(190, 26, 190);
  color:black;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#ec0bce;
  transform:scale(1.1);
}

/* OUTPUT */
pre{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  border:1px solid rgb(234, 0, 255);
  background:black;
  color:#f04dff;
  box-shadow:0 0 20px rgb(255, 0, 255);
  white-space:pre-wrap;
}

/* SOCIAL */
.socials{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}
.socials a{
  width:55px;height:55px;
  border-radius:50%;
  background:#111;
  border:2px solid rgb(218, 13, 149);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px rgb(235, 4, 196);
  transition:0.3s;
}
.socials a:hover{
  transform:scale(1.2) rotate(10deg);
  box-shadow:0 0 30px rgb(255, 0, 200);
}
.socials img{width:28px}

/* BYTE */
.byte-count{
  margin-top:10px;
  text-shadow:0 0 10px rgb(241, 6, 202)(255, 0, 255);
}
</style>
</head>

<body>

<div class="socials">
<a href="https://discord.gg/3xADxN2Y9C" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png"></a>

<a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>

<a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>

<a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733641.png"></a>
</div>

<div class="card">
<h1>AETHER PRO </h1>

<input id="input" placeholder="A1 B2 00 ?? FF ...">

<div class="byte-count" id="count">BYTE COUNT: 0</div>

<button onclick="copyCode()">COPY</button>

<pre id="output">unsigned char aob[] = { };</pre>
</div>

<div class="scroll-bar">
<div class="scroll-text">
WELCOME TO AETHER PRO TOOL  | BEST AOB CONVERTER  | MADE BY MhiroxCoder 
</div>
</div>

<script>
const input=document.getElementById("input");
const output=document.getElementById("output");
const count=document.getElementById("count");

input.addEventListener("input",()=>{
  const parts=input.value.trim().split(/\s+/);
  let bytes=[],c=0;

  for(let p of parts){
    if(p==="??"){
      bytes.push("'?'");
    }else if(/^[A-Fa-f0-9]{2}$/.test(p)){
      bytes.push("0x"+p.toUpperCase());
      c++;
    }
  }

  count.textContent="BYTE COUNT: "+c;
  output.textContent="unsigned char aob[] = { "+bytes.join(", ")+" };";
});

function copyCode(){
  navigator.clipboard.writeText(output.textContent);
}
</script>

</body>
</html>
